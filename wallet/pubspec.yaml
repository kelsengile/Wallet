name: wallet
description: A personal wallet app with SQLite storage.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.3 # SQLite database
  path: ^1.9.0 # Needed to locate the DB file correctly
  intl: ^0.19.0 # For date formatting
  image_picker: ^1.1.2
  shared_preferences: ^2.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/themes/
